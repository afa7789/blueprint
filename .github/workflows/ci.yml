name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  GOLANGCI_LINT_VERSION: "v1.61.0"
  BUN_VERSION: "1.2.21"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Lint & Vet
        run: go vet ./... && golangci-lint run ./...

      - name: Test & Build
        run: |
          go test ./... -race -count=1
          CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/blueprint-api ./cmd/server
          CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/blueprint-health ./cmd/health

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install & Check
        run: bun install --frozen-lockfile && bun run vue-tsc --noEmit && bun run test

      - name: Build
        run: bun run build

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          if [ "${{ needs.backend.result }}" != "success" ] || [ "$needs.frontend.result" != "success" ]; then
            exit 1
          fi
