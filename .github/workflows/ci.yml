name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  BUN_VERSION: "1.2.21"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2

      - name: Build & Test
        run: |
          # Backend
          cd backend
          go mod download
          go vet ./...
          golangci-lint run ./...
          go test ./... -race -count=1
          CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/blueprint-api ./cmd/server
          CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/blueprint-health ./cmd/health

          # Frontend
          cd ../frontend
          bun install --frozen-lockfile
          bun run vue-tsc --noEmit
          bun run test
          bun run build
