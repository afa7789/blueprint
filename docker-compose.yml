services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blueprint
      POSTGRES_PASSWORD: blueprint
      POSTGRES_DB: blueprint
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    ports:
      - "8083:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://blueprint:blueprint@postgres:5432/blueprint?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
