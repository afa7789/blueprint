global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'blueprint-api'
    metrics_path: /healthz
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'blueprint-health'
    metrics_path: /health
    params:
      format: ['json']
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:8081']
