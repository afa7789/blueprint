version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - errname
    - errorlint
    - revive

  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam

formatters:
  enable:
    - gofmt
    - goimports
